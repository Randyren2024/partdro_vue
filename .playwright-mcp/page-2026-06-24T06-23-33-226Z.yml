  - generic [ref=e202]:
    - heading "Learn More About LM-MSE Mini SE Camera Drone" [level=2] [ref=e203]
    - generic [ref=e204]:
      - generic [ref=e205]:
        - img "Voice Control with WK-V8 Handle" [ref=e207]
        - generic [ref=e208]:
          - heading "Voice Control with WK-V8 Handle" [level=3] [ref=e209]
          - paragraph [ref=e210]: Pair the Mini SE with the optional WK-V8 voice handle and fly it hands-free. Speak commands to take off, land, orbit, follow, or stop — useful when your hands are full, you are wearing gloves, or you simply want a smoother vlog workflow. Voice recognition works in English and Mandarin out of the box.
      - generic [ref=e211]:
        - img "AI Smart Follow, Five Modes" [ref=e213]
        - generic [ref=e214]:
          - heading "AI Smart Follow, Five Modes" [level=3] [ref=e215]
          - paragraph [ref=e216]: Tap a subject on screen and the Mini SE keeps it centered using one of five tracking modes. Bird’s Eye climbs to a top-down view; Fly Steady holds a constant distance behind a moving subject; Cross Terrain follows across varied landscape; Orbit Follow circles the subject; Quad Follow flies a four-corner reveal pattern around it.
      - generic [ref=e217]:
        - img "4K UHD Camera with 3-Axis Gimbal" [ref=e219]
        - generic [ref=e220]:
          - heading "4K UHD Camera with 3-Axis Gimbal" [level=3] [ref=e221]
          - paragraph [ref=e222]: A 1/2.3-inch CMOS sensor captures 4K UHD video at 30 fps and high-resolution stills. The 3-axis mechanical gimbal keeps the horizon level through aggressive maneuvers, so every clip comes out smooth, level, and share-ready straight from the drone — no post-processing required.
      - generic [ref=e223]:
        - img "4 km HD Live Transmission" [ref=e225]
        - generic [ref=e226]:
          - heading "4 km HD Live Transmission" [level=3] [ref=e227]
          - paragraph [ref=e228]: The 5 GHz remote streams 1080p live view up to 4 km in open environments with sub-200 ms latency. Choose between the P2 controller with a built-in 5.5-inch screen, the WK-V8 voice handle for hands-free control, or a third option for phone-based flight — whichever fits your workflow.
      - generic [ref=e229]:
        - img "30-Minute Intelligent Flight Battery" [ref=e231]
        - generic [ref=e232]:
          - heading "30-Minute Intelligent Flight Battery" [level=3] [ref=e233]
          - paragraph [ref=e234]: A high-density LiPo 2S pack delivers up to 30 minutes of hover or 22–25 minutes of active mixed flight per charge — among the longest flight times in the sub-250 g category. The standard kit includes one battery; an optional Fly More Combo adds a charging hub and two spare packs.
      - generic [ref=e235]:
        - img "Toss-to-Launch & One-Tap QuickShots" [ref=e237]
        - generic [ref=e238]:
          - heading "Toss-to-Launch & One-Tap QuickShots" [level=3] [ref=e239]
          - paragraph [ref=e240]: Toss the Mini SE into the air from your palm and it hovers in place, ready for the next command. Combine with QuickShots — Orbit, Pull-Away, Rise, and Tail — for instant cinematic clips that drop straight into TikTok, Reels, or YouTube Shorts with no editing required.
