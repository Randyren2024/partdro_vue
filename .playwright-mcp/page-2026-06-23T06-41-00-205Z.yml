  - generic [ref=e185]:
    - heading "Learn More About LM-MINI Camera Drone" [level=2] [ref=e186]
    - generic [ref=e187]:
      - generic [ref=e188]:
        - img "One-Tap Takeoff & Landing" [ref=e190]
        - generic [ref=e191]:
          - heading "One-Tap Takeoff & Landing" [level=3] [ref=e192]
          - paragraph [ref=e193]: Beginner-friendly from the first flight. One-tap takeoff, one-tap return, and an intuitive on-screen interface that gets you in the air in under 60 seconds — no piloting experience required.
      - generic [ref=e194]:
        - img "See Farther. Fly Smarter." [ref=e196]
        - generic [ref=e197]:
          - heading "See Farther. Fly Smarter." [level=3] [ref=e198]
          - paragraph [ref=e199]: SkyBridge HD transmission streams 1080p/60fps live view up to 12 km away, so you can frame the shot, scout the route, and bring the drone home with confidence — even when it is well beyond line of sight.
      - generic [ref=e200]:
        - img "1/2-inch Sony CMOS Sensor" [ref=e202]
        - generic [ref=e203]:
          - heading "1/2-inch Sony CMOS Sensor" [level=3] [ref=e204]
          - paragraph [ref=e205]: A large 1/2-inch Sony sensor with f/1.7 aperture captures 48MP stills and 4K/60fps HDR video. High dynamic range preserves shadow detail and highlight roll-off in golden-hour and backlit scenes.
      - generic [ref=e206]:
        - img "3-Axis Mechanical Gimbal" [ref=e208]
        - generic [ref=e209]:
          - heading "3-Axis Mechanical Gimbal" [level=3] [ref=e210]
          - paragraph [ref=e211]: A real mechanical gimbal — not electronic stabilization — keeps every frame steady through aggressive maneuvers, wind gusts, and high-speed flight. Cinematic smoothness, zero jello.
      - generic [ref=e212]:
        - img "Level 5 Wind Resistance" [ref=e214]
        - generic [ref=e215]:
          - heading "Level 5 Wind Resistance" [level=3] [ref=e216]
          - paragraph [ref=e217]: Hold position and hold your shot in winds up to 15 m/s (Level 5). The Mini stays locked on subject even when coastal gusts, ridge winds, or thermal updrafts would shake a lesser drone.
      - generic [ref=e218]:
        - img "Hands-Free Auto Track" [ref=e220]
        - generic [ref=e221]:
          - heading "Hands-Free Auto Track" [level=3] [ref=e222]
          - paragraph [ref=e223]: AI subject tracking keeps you, your bike, your dog, or your group centered in frame — no follow-me beacon, no remote input required. Walk, ride, ski. The Mini does the flying.
