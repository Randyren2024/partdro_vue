    - heading "Learn More About LM-MINI Camera Drone" [level=2] [ref=e166]
    - generic [ref=e167]:
      - generic [ref=e168]:
        - img "One-Tap Takeoff & Landing" [ref=e170]
        - generic [ref=e171]:
          - heading "One-Tap Takeoff & Landing" [level=3] [ref=e172]
          - paragraph [ref=e173]: Beginner-friendly from the first flight. One-tap takeoff, one-tap return, and an intuitive on-screen interface that gets you in the air in under 60 seconds — no piloting experience required.
      - generic [ref=e174]:
        - img "See Farther. Fly Smarter." [ref=e176]
        - generic [ref=e177]:
          - heading "See Farther. Fly Smarter." [level=3] [ref=e178]
          - paragraph [ref=e179]: SkyBridge HD transmission streams 1080p/60fps live view up to 12 km away, so you can frame the shot, scout the route, and bring the drone home with confidence — even when it is well beyond line of sight.
      - generic [ref=e180]:
        - img "1/2-inch Sony CMOS Sensor" [ref=e182]
        - generic [ref=e183]:
          - heading "1/2-inch Sony CMOS Sensor" [level=3] [ref=e184]
          - paragraph [ref=e185]: A large 1/2-inch Sony sensor with f/1.7 aperture captures 48MP stills and 4K/60fps HDR video. High dynamic range preserves shadow detail and highlight roll-off in golden-hour and backlit scenes.
      - generic [ref=e186]:
        - img "3-Axis Mechanical Gimbal" [ref=e188]
        - generic [ref=e189]:
          - heading "3-Axis Mechanical Gimbal" [level=3] [ref=e190]
          - paragraph [ref=e191]: A real mechanical gimbal — not electronic stabilization — keeps every frame steady through aggressive maneuvers, wind gusts, and high-speed flight. Cinematic smoothness, zero jello.
      - generic [ref=e192]:
        - img "Level 5 Wind Resistance" [ref=e194]
        - generic [ref=e195]:
          - heading "Level 5 Wind Resistance" [level=3] [ref=e196]
          - paragraph [ref=e197]: Hold position and hold your shot in winds up to 15 m/s (Level 5). The Mini stays locked on subject even when coastal gusts, ridge winds, or thermal updrafts would shake a lesser drone.
      - generic [ref=e198]:
        - img "Hands-Free Auto Track" [ref=e200]
        - generic [ref=e201]:
          - heading "Hands-Free Auto Track" [level=3] [ref=e202]
          - paragraph [ref=e203]: AI subject tracking keeps you, your bike, your dog, or your group centered in frame — no follow-me beacon, no remote input required. Walk, ride, ski. The Mini does the flying.
