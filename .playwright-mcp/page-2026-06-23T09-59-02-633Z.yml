  - generic [ref=e182]:
    - heading "Learn More About LM-MINI Camera Drone" [level=2] [ref=e183]
    - generic [ref=e184]:
      - generic [ref=e185]:
        - img "One-Tap Takeoff & Landing" [ref=e187]
        - generic [ref=e188]:
          - heading "One-Tap Takeoff & Landing" [level=3] [ref=e189]
          - paragraph [ref=e190]: Beginner-friendly from the first flight. One-tap takeoff, one-tap return, and an intuitive on-screen interface that gets you in the air in under 60 seconds — no piloting experience required.
      - generic [ref=e191]:
        - img "See Farther. Fly Smarter." [ref=e193]
        - generic [ref=e194]:
          - heading "See Farther. Fly Smarter." [level=3] [ref=e195]
          - paragraph [ref=e196]: SkyBridge HD transmission streams 1080p/60fps live view up to 12 km away, so you can frame the shot, scout the route, and bring the drone home with confidence — even when it is well beyond line of sight.
      - generic [ref=e197]:
        - img "1/2-inch Sony CMOS Sensor" [ref=e199]
        - generic [ref=e200]:
          - heading "1/2-inch Sony CMOS Sensor" [level=3] [ref=e201]
          - paragraph [ref=e202]: A large 1/2-inch Sony sensor with f/1.7 aperture captures 48MP stills and 4K/60fps HDR video. High dynamic range preserves shadow detail and highlight roll-off in golden-hour and backlit scenes.
      - generic [ref=e203]:
        - img "3-Axis Mechanical Gimbal" [ref=e205]
        - generic [ref=e206]:
          - heading "3-Axis Mechanical Gimbal" [level=3] [ref=e207]
          - paragraph [ref=e208]: A real mechanical gimbal — not electronic stabilization — keeps every frame steady through aggressive maneuvers, wind gusts, and high-speed flight. Cinematic smoothness, zero jello.
      - generic [ref=e209]:
        - img "Level 5 Wind Resistance" [ref=e211]
        - generic [ref=e212]:
          - heading "Level 5 Wind Resistance" [level=3] [ref=e213]
          - paragraph [ref=e214]: Hold position and hold your shot in winds up to 15 m/s (Level 5). The Mini stays locked on subject even when coastal gusts, ridge winds, or thermal updrafts would shake a lesser drone.
      - generic [ref=e215]:
        - img "Hands-Free Auto Track" [ref=e217]
        - generic [ref=e218]:
          - heading "Hands-Free Auto Track" [level=3] [ref=e219]
          - paragraph [ref=e220]: AI subject tracking keeps you, your bike, your dog, or your group centered in frame — no follow-me beacon, no remote input required. Walk, ride, ski. The Mini does the flying.
